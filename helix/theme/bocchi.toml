# grey1 = "#403333"
# grey2 = "#403333"

bg_dim = "#1e2326"
bg0 = "#272e33"
bg1 = "#2e383c"
bg3 = "#414b50"
bg4 = "#495156"
bg5 = "#4f5b58"
fg = "#d3c6aa"

grey0 = "#7a8478"
grey1 = "#403333"
grey2 = "#9da9a0"

linenr_gray = "#5a6468"
linenr_gray_selected = "#6a7478"

white = "#dddddd"
gray = "#9da9a0"

accent1 = "#ffa6c9"       #  primary accent
accent2 = "#4a8bc2"       # secondary accent
accent3 = "#ffd166"       # tertiary accent
accent4 = "#e76f51"       # warnings and errors
